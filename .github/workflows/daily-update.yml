name: Money Forward Daily Update

on:
  schedule:
    # JST 6:50
    - cron: "50 21 * * *"
    # JST 15:20
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: "daily-update"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        env:
          MF_USER: ${{ secrets.MF_USERNAME }}
          RUN_TASK: ${{ vars.RUN_TASK }}
        run: echo "should-run=${{ env.MF_USER != '' && env.RUN_TASK == 'true' }}" >> $GITHUB_OUTPUT

  update:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/auth-state-cache
        with:
          mode: restore
          enabled: ${{ vars.CACHE_AUTH_STATE }}
      - name: DB hash before crawler
        run: sha256sum data/moneyforward.db 2>/dev/null || echo "DB not found"
      - run: pnpm --filter @mf-dashboard/crawler start
        env:
          MF_USERNAME: ${{ secrets.MF_USERNAME }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
          MF_TOTP_SECRET: ${{ secrets.MF_TOTP_SECRET }}
      - uses: ./.github/actions/auth-state-cache
        if: always()
        with:
          mode: save
          enabled: ${{ vars.CACHE_AUTH_STATE }}
      - name: Debug DB files
        run: |
          echo "=== DB hash before/after ==="
          echo "data/moneyforward.db:"
          sha256sum data/moneyforward.db 2>/dev/null || echo "not found"
          ls -la data/moneyforward.db* 2>/dev/null || echo "not found in data/"
          echo "=== apps/crawler/data/ ==="
          ls -la apps/crawler/data/moneyforward.db* 2>/dev/null || echo "not found in apps/crawler/data/"
          echo "=== last_scraped_at in DB ==="
          sqlite3 data/moneyforward.db "SELECT id, name, last_scraped_at FROM groups;" 2>/dev/null || echo "sqlite3 not available"
          echo "=== git status ==="
          git status --short
      - name: Copy DB and push
        run: |
          # クローラーが apps/crawler/data/ に保存する場合があるのでコピー
          if [ -f "apps/crawler/data/moneyforward.db" ]; then
            cp apps/crawler/data/moneyforward.db data/moneyforward.db
            echo "Copied from apps/crawler/data/"
          fi
          # タイムスタンプファイルを更新（DBが同一でもデプロイがトリガーされるように）
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last-updated.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/moneyforward.db data/last-updated.txt
          git diff --cached --quiet || git commit -m "chore: update database"
          git push
      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
