name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "data/**"
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Set DB path
        id: db
        run: |
          if [ -f "data/moneyforward.db" ]; then
            echo "path=${{ github.workspace }}/data/moneyforward.db" >> $GITHUB_OUTPUT
            echo "demo=false" >> $GITHUB_OUTPUT
          else
            echo "path=${{ github.workspace }}/data/demo.db" >> $GITHUB_OUTPUT
            echo "demo=true" >> $GITHUB_OUTPUT
          fi
      - name: Build Next.js app
        run: |
          export DB_PATH="${{ steps.db.outputs.path }}"
          export DEMO_MODE="${{ steps.db.outputs.demo }}"
          export GITHUB_PAGES="true"
          export NEXT_PUBLIC_GITHUB_ORG="${{ github.repository_owner }}"
          export NEXT_PUBLIC_GITHUB_REPO="${{ github.event.repository.name }}"
          pnpm --filter web build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/out
      - id: deployment
        uses: actions/deploy-pages@v4
